<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./helper.js" defer></script>
    <script src="./templates.js" defer></script>
    <script src="./scripts.js" defer></script>
    <script
      src="./node_modules/bootstrap/dist/js/bootstrap.min.js"
      defer
    ></script>

    <title>Pokedex</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico" />
  </head>
  <body
    class="container d-flex flex-column align-items-center justify-content-center my-0 p-3 p-sm-0"
  >
    <header class="container m-3 p-0">
      <nav class="navbar bg-body-tertiary p-3 m-0 pokemon-nav-shell">
        <div
          class="container-fluid flex-column flex-md-row align-items-center gap-3 justify-content-center justify-content-lg-between"
        >
          <a
            class="navbar-brand pokemon-brand d-flex align-items-center gap-2 clickable"
            href="#"
          >
            <img
              src="./assets/img/pokemon-logo.svg"
              alt="Pokemon Logo"
              height="70"
            />
          </a>
          <form
            class="d-flex pokemon-search"
            role="search"
            onsubmit="
              event.preventDefault();
              searchPokemon(this.querySelector('input').value);
            "
          >
            <input
              id="pokemonSearchInput"
              class="form-control pokemon-search-input"
              type="search"
              placeholder="Search for Pokemon"
              aria-label="Search for Pokemon"
              oninput="if (!this.value) resetSearch();"
            />
            <button class="btn pokemon-action-btn" type="submit">Search</button>
          </form>
        </div>
      </nav>
    </header>
    <main class="w-100 mb-3 my-0 py-0">
      <div id="pokemonContainer" class="row"></div>
    </main>
    <button
      class="btn pokemon-action-btn mb-4"
      id="loadMoreButton"
      onclick="loadMore()"
    >
      Load More
    </button>
  </body>
</html>
