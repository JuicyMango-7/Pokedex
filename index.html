<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./templates.js" defer></script>
    <script src="./scripts.js" defer></script>
    <title>Pokedex</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico" />
  </head>
  <body
    class="container d-flex flex-column align-items-center justify-content-center"
  >
    <header class="container mb-5 p-0">
      <nav class="navbar bg-body-tertiary p-2">
        <div
          class="container-fluid flex-column flex-sm-row align-items-stretch align-items-sm-center gap-2"
        >
          <a class="navbar-brand mx-auto mx-sm-0">
            <img
              src="./assets/img/pokemon-logo.svg"
              alt="Bootstrap"
              height="70"
            />
          </a>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search for Pokemon"
              aria-label="Search for Pokemon"
            />
            <button class="btn btn-outline-warning" type="submit">
              Search
            </button>
          </form>
        </div>
      </nav>
    </header>
    <main class="mb-4">
      <div id="pokemonContainer" class="row mb-0"></div>
    </main>
    <button class="btn btn-outline-warning mb-4" id="loadMoreButton">
      Load More
    </button>
  </body>
</html>
